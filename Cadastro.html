<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - AutoElite Motors</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Raleway:wght@400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    
    <header>
        <img src="Imagens/logo_cabecalho.png" class="logo" alt="Logo da Loja">
    </header>

<nav class="menu">
    <a href="index.html">INICIO</a>
    <a href="index.html#estoque">ESTOQUE</a>
    <a href="index.html#contato">CONTATOS</a>
    <a href="index.html#equipe">MINHA EQUIPE</a>
    <a href="cadastro.html">CADASTRE-SE</a>
    <a href="login.html">LOGIN</a>
</nav>


    <div class="form-container">

        <h2>Cadastro de Clientes</h2>

        <form action="login.html">

            <label for="nome">Nome Completo:</label><br>
            <input type="text" id="nome" name="nome" required><br><br>

            <label for="cpf">CPF:</label><br>
            <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required><br><br>

            <label for="dataNascimento">Data de Nascimento:</label><br>
            <input type="date" id="dataNascimento" name="dataNascimento" required><br><br>

            <label for="telefone">Telefone:</label><br>
            <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required><br><br>

            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email" placeholder="Insira um e-mail válido" required><br><br>

            <label for="mensagem">Observações:</label><br>
            <textarea id="mensagem" name="mensagem" rows="5" cols="30"
                placeholder="Digite alguma observação"></textarea><br><br>

            <input type="submit" value="Cadastrar">

        </form>

    </div>

</body>

</html>
