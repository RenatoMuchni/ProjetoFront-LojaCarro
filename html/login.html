<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AutoElite Motors</title>

    <link rel="stylesheet" href="../css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Raleway:wght@400;600&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Barra de acessibilidade -->
    <nav id="barra-acessibilidade" aria-label="Opções de acessibilidade">
        <span class="ac-titulo">Acessibilidade</span>

        <div class="ac-grupo">
            <button type="button" id="ac-contraste" class="ac-btn" onclick="ligarContraste()">Alto contraste: desativado</button>
        </div>

        <div class="ac-grupo">
            <span class="ac-rotulo">Texto</span>
            <button type="button" class="ac-btn" onclick="diminuirFonte()" aria-label="Diminuir texto">A−</button>
            <span class="ac-valor" id="ac-fonte" aria-live="polite">100%</span>
            <button type="button" class="ac-btn" onclick="aumentarFonte()" aria-label="Aumentar texto">A+</button>
        </div>

        <div class="ac-grupo">
            <span class="ac-rotulo">Espaçamento</span>
            <button type="button" class="ac-btn" onclick="diminuirEspaco()" aria-label="Reduzir espaçamento">−</button>
            <span class="ac-valor" id="ac-espaco" aria-live="polite">Normal</span>
            <button type="button" class="ac-btn" onclick="aumentarEspaco()" aria-label="Aumentar espaçamento">+</button>
        </div>

        <button type="button" id="ac-redefinir" class="ac-btn" onclick="redefinir()">Redefinir</button>
    </nav>

    <header>
        <img src="../imagens/logo_cabecalho.png" class="logo" alt="Logo da Loja">
    </header>

    <nav class="menu">
        <a href="../index.html">INICIO</a>
        <a href="../index.html#estoque">ESTOQUE</a>
        <a href="../index.html#contato">CONTATOS</a>
        <a href="cadastro.html">CADASTRE-SE</a>
        <a href="login.html">LOGIN</a>
    </nav>

    <div class="form-container">

        <h1>Login do Cliente</h1>

        <form action="index.html">

            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required><br><br>

            <label for="senha">Senha:</label><br>
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required><br><br>

            <input type="submit" value="Entrar">

        </form>

    </div>

    <script src="../js/script.js"></script>

</body>

</html>
