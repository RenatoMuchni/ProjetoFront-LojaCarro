<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AutoElite Motors</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Raleway:wght@400;600&display=swap"
        rel="stylesheet">
</head>

<body>

    <header>
        <img src="./imagens/logo_cabecalho.png" class="logo" alt="Logo da Loja">
    </header>

    <nav class="menu">
        <a href="index.html">INICIO</a>
        <a href="index.html#estoque">ESTOQUE</a>
        <a href="index.html#contato">CONTATOS</a>
        <a href="cadastro.html">CADASTRE-SE</a>
        <a href="login.html">LOGIN</a>
    </nav>

    <div class="form-container">

        <h1>Login do Cliente</h1>

        <form action="index.html">

            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email"
                placeholder="Digite seu e-mail" required><br><br>

            <label for="senha">Senha:</label><br>
            <input type="password" id="senha" name="senha"
                placeholder="Digite sua senha" required><br><br>

            <input type="submit" value="Entrar">

        </form>

    </div>

</body>

</html>
